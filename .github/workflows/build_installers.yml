name: Build installable packages

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build debug APK
        run: ./scripts/package_android.sh

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ReadAnywhere-android-apk
          path: dist/android/*.apk

  macos-dmg-pkg:
    name: macOS DMG and PKG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build DMG and PKG
        run: ./scripts/package_macos.sh

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: ReadAnywhere-macos-dmg-pkg
          path: |
            dist/macos/*.dmg
            dist/macos/*.pkg
            dist/macos/*.zip
